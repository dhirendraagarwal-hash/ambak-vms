<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AMBAK · Self Check-in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/emailjs-com/3.2.0/email.min.js"></script>
<style>
:root{
  --navy:#0B1F3A; --navy-light:#132C52; --paper:#F5F6F8; --line:#E2E5EB;
  --amber:#E0932A; --amber-deep:#C9781A; --green:#1F8A57; --muted:#6B7280;
  --font-display:'Georgia','Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-body);background:linear-gradient(180deg,var(--navy) 0%,#173764 100%);min-height:100vh;color:var(--navy);}
.hidden{display:none !important;}
.wrap{max-width:520px;margin:0 auto;padding:30px 16px;}
.card{background:#fff;border-radius:16px;padding:34px;}
.head{text-align:center;margin-bottom:22px;}
.mark{width:56px;height:56px;border-radius:12px;background:var(--amber);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:bold;font-size:26px;color:var(--navy);margin:0 auto 10px;}
.title{font-family:var(--font-display);font-size:26px;}
.sub{font-size:13px;color:var(--muted);}
.progress{display:flex;gap:6px;margin:22px 0 24px;}
.progress div{flex:1;height:4px;border-radius:3px;background:var(--line);}
.progress div.done{background:var(--amber);}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:13px;font-weight:600;}
.field label .req{color:var(--amber-deep);}
.field input,.field select{padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14.5px;background:#fff;}
.field input:focus,.field select:focus{outline:none;border-color:var(--amber);}

/* photo section */
.photo-block{margin-bottom:18px;}
.photo-block label{font-size:13px;font-weight:600;display:block;margin-bottom:8px;}
.cam-shell{
  width:100%;aspect-ratio:4/3;background:#0e1626;border-radius:12px;overflow:hidden;position:relative;
  border:1px solid var(--line);
}
.cam-shell video, .cam-shell canvas, .cam-shell img{width:100%;height:100%;object-fit:cover;display:block;}
.cam-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#9AA6BE;font-size:13px;gap:8px;
}
.cam-badge{
  position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;
  padding:4px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;
}
.cam-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;}
@keyframes pulse{0%{opacity:1;}50%{opacity:.3;}100%{opacity:1;}}
.photo-actions{display:flex;gap:10px;margin-top:10px;}
.btn{padding:11px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-amber{background:var(--amber);color:var(--navy);}
.btn-amber:hover{background:var(--amber-deep);color:#fff;}
.btn-outline{background:#fff;border:1px solid var(--line);color:var(--navy);}
.btn-outline:hover{border-color:var(--navy);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:disabled{background:#B9C3D6;cursor:not-allowed;}
.btn-full{width:100%;}
.photo-status{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;}
.photo-status.ok{color:var(--green);font-weight:600;}

.qr-result{text-align:center;padding:6px 0;}
#qrcode-canvas{display:inline-block;padding:14px;background:#fff;border:1px solid var(--line);border-radius:10px;margin:14px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="mark">A</div>
      <div class="title">Welcome to AMBAK</div>
      <div class="sub">Please check in below</div>
    </div>
    <div class="progress"><div id="p1" class="done"></div><div id="p2"></div><div id="p3"></div></div>

    <!-- FORM + PHOTO ON ONE SCREEN -->
    <div id="step-form">
      <div class="field"><label>Full Name <span class="req">*</span></label>
        <input id="k-name" placeholder="Your full name"></div>
      <div class="field"><label>Mobile Number <span class="req">*</span></label>
        <input id="k-mobile" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric"></div>
      <div class="field"><label>Coming From (City / Location) <span class="req">*</span></label>
        <input id="k-location" placeholder="e.g. Gurugram"></div>
      <div class="field"><label>Whom do you want to meet? <span class="req">*</span></label>
        <select id="k-host"><option value="">Loading employees…</option></select></div>
      <div class="field"><label>Purpose of Visit</label>
        <input id="k-purpose" placeholder="e.g. Interview, Meeting, Delivery"></div>

      <div class="photo-block">
        <label>Your Photo <span class="req">*</span></label>
        <div class="cam-shell" id="cam-shell">
          <div class="cam-placeholder" id="cam-placeholder">
            <span style="font-size:26px;">📷</span>
            <span>Tap "Enable Camera" to take your photo</span>
          </div>
          <video id="cam-video" class="hidden" autoplay playsinline muted></video>
          <img id="cam-photo" class="hidden">
          <div class="cam-badge hidden" id="cam-badge"><span class="dot"></span>LIVE</div>
        </div>
        <canvas id="cam-canvas" class="hidden"></canvas>
        <div class="photo-actions">
          <button class="btn btn-outline" style="flex:1;" id="btn-enable-cam" onclick="enableCamera()">Enable Camera</button>
          <button class="btn btn-amber hidden" style="flex:1;" id="btn-capture" onclick="capturePhoto()">📸 Capture</button>
          <button class="btn btn-outline hidden" style="flex:1;" id="btn-retake" onclick="retakePhoto()">↺ Retake</button>
        </div>
        <div class="photo-status" id="photo-status">No photo captured yet</div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-continue" onclick="submitCheckin()">Complete Check-in →</button>
    </div>

    <!-- SUCCESS -->
    <div id="step-success" class="hidden qr-result">
      <div style="font-size:42px;">✅</div>
      <h3 style="font-family:var(--font-display);margin:6px 0;">Checked In!</h3>
      <p class="sub" id="welcome-text"></p>
      <div id="qrcode-canvas"></div>
      <p class="sub">Show this QR code at reception when you leave, for quick check-out.</p>
      <button class="btn btn-primary btn-full" onclick="resetForm()" style="margin-top:14px;">Done · New Visitor</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   📧 EMAILJS CONFIG — paste your 3 keys here when ready.
   Get them from https://dashboard.emailjs.com
   1. EMAILJS_SERVICE_ID  -> Email Services tab
   2. EMAILJS_TEMPLATE_ID -> Email Templates tab
   3. EMAILJS_PUBLIC_KEY  -> Account > General
   Until these are filled in, check-in still works fine —
   emails are simply skipped (no error shown to the visitor).
   ============================================================ */
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';

const emailConfigured = ![EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, EMAILJS_PUBLIC_KEY].some(v=>v.startsWith('YOUR_'));
if(emailConfigured && window.emailjs){ emailjs.init(EMAILJS_PUBLIC_KEY); }

async function sendHostEmail(visitor, hostEmp){
  if(!emailConfigured || !hostEmp || !hostEmp.email) return {sent:false};
  try{
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: hostEmp.email,
      host_name: hostEmp.name,
      visitor_name: visitor.name,
      mobile: visitor.mobile,
      location: visitor.location,
      purpose: visitor.purpose || '—',
      checkin_time: new Date(visitor.checkinTime).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'})
    });
    return {sent:true};
  }catch(e){
    console.error('EmailJS send failed:', e);
    return {sent:false, error:e};
  }
}

/* Shared storage keys so this page stays compatible with the AMBAK admin/reception dashboard */
/* ============================================================
   🔥 FIREBASE CONFIG — Realtime Database URL
   ============================================================ */
const FIREBASE_URL = 'https://ambak-vms-default-rtdb.asia-southeast1.firebasedatabase.app';

const S = {
  async getAll(key, fallback){
    try{
      const res = await fetch(`${FIREBASE_URL}/${key}.json`);
      const data = await res.json();
      return (data === null || data === undefined) ? fallback : data;
    }catch(e){ console.error('Firebase read failed:', e); return fallback; }
  },
  async set(key, val){
    try{
      await fetch(`${FIREBASE_URL}/${key}.json`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(val)
      });
    }catch(e){ console.error('Firebase write failed:', e); }
  }
};

let stream = null;
let capturedPhoto = null;
let EMPLOYEES = [];

async function loadEmployees(){
  EMPLOYEES = await S.getAll('employees', []);
  if(EMPLOYEES.length===0){
    /* same defaults as the admin dashboard, so both stay in sync on first run */
    EMPLOYEES = [
      {id:'e1',name:'Rohit Sharma',email:'rohit@ambak.com',dept:'Sales'},
      {id:'e2',name:'Priya Verma',email:'priya@ambak.com',dept:'HR'},
      {id:'e3',name:'Aman Gupta',email:'aman@ambak.com',dept:'Operations'}
    ];
    await S.set('employees', EMPLOYEES);
  }
  const sel = document.getElementById('k-host');
  sel.innerHTML = EMPLOYEES.map(e=>`<option value="${e.id}">${e.name} — ${e.dept||'—'}</option>`).join('');
}
loadEmployees();

async function enableCamera(){
  const video = document.getElementById('cam-video');
  const placeholder = document.getElementById('cam-placeholder');
  const badge = document.getElementById('cam-badge');
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    video.srcObject = stream;
    video.classList.remove('hidden');
    placeholder.classList.add('hidden');
    badge.classList.remove('hidden');
    document.getElementById('btn-enable-cam').classList.add('hidden');
    document.getElementById('btn-capture').classList.remove('hidden');
    document.getElementById('photo-status').textContent = 'Camera ready — center your face and capture';
  }catch(e){
    document.getElementById('photo-status').textContent = 'Camera not available on this device/browser. You can continue without a photo.';
  }
}

function capturePhoto(){
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  const img = document.getElementById('cam-photo');
  canvas.width = video.videoWidth || 480;
  canvas.height = video.videoHeight || 360;
  canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
  capturedPhoto = canvas.toDataURL('image/jpeg',0.7);

  img.src = capturedPhoto;
  img.classList.remove('hidden');
  video.classList.add('hidden');
  document.getElementById('cam-badge').classList.add('hidden');

  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }

  document.getElementById('btn-capture').classList.add('hidden');
  document.getElementById('btn-retake').classList.remove('hidden');
  const status = document.getElementById('photo-status');
  status.textContent = '✓ Photo captured';
  status.classList.add('ok');
}

async function retakePhoto(){
  capturedPhoto = null;
  document.getElementById('cam-photo').classList.add('hidden');
  document.getElementById('photo-status').classList.remove('ok');
  document.getElementById('btn-retake').classList.add('hidden');
  await enableCamera();
}

async function submitCheckin(){
  const name = document.getElementById('k-name').value.trim();
  const mobile = document.getElementById('k-mobile').value.trim();
  const location = document.getElementById('k-location').value.trim();
  const hostId = document.getElementById('k-host').value;
  const purpose = document.getElementById('k-purpose').value.trim();
  const hostEmp = EMPLOYEES.find(e=>e.id===hostId);
  const hostName = hostEmp ? hostEmp.name : '';

  if(!hostId){
    alert('Please select who you are meeting');
    return;
  }

  if(!name || !mobile || !location){
    document.getElementById('photo-status').textContent = 'Please fill all required fields above.';
    document.getElementById('photo-status').classList.remove('ok');
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  if(!/^[0-9]{10}$/.test(mobile)){
    alert('Please enter a valid 10-digit mobile number');
    return;
  }
  if(!capturedPhoto){
    if(!confirm('No photo captured. Continue check-in without a photo?')) return;
  }

  const id = 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const visitor = {
    id, name, mobile, location,
    hostId, hostName,
    purpose, photo: capturedPhoto,
    checkinTime: Date.now(), checkoutTime: null,
    status: 'in', source: 'kiosk'
  };

  try{
    await fetch(`${FIREBASE_URL}/visitors/${visitor.id}.json`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(visitor)
    });
  }catch(e){ console.error('Firebase write failed:', e); }

  const emailResult = await sendHostEmail(visitor, hostEmp);

  document.getElementById('step-form').classList.add('hidden');
  document.getElementById('step-success').classList.remove('hidden');
  document.getElementById('p2').classList.add('done');
  document.getElementById('p3').classList.add('done');
  document.getElementById('welcome-text').textContent = emailResult.sent
    ? `${name}, meeting ${hostName} — host notified by email ✓`
    : `${name}, meeting ${hostName}`;

  const box = document.getElementById('qrcode-canvas');
  box.innerHTML = '';
  new QRCode(box, {text:id, width:170, height:170, colorDark:'#0B1F3A', colorLight:'#ffffff'});
}

function resetForm(){
  loadEmployees();
  ['k-name','k-mobile','k-location','k-purpose'].forEach(id=>document.getElementById(id).value='');
  capturedPhoto = null;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('cam-video').classList.add('hidden');
  document.getElementById('cam-photo').classList.add('hidden');
  document.getElementById('cam-placeholder').classList.remove('hidden');
  document.getElementById('cam-badge').classList.add('hidden');
  document.getElementById('btn-enable-cam').classList.remove('hidden');
  document.getElementById('btn-capture').classList.add('hidden');
  document.getElementById('btn-retake').classList.add('hidden');
  const status = document.getElementById('photo-status');
  status.textContent = 'No photo captured yet';
  status.classList.remove('ok');
  document.getElementById('step-success').classList.add('hidden');
  document.getElementById('step-form').classList.remove('hidden');
  document.getElementById('p2').classList.remove('done');
  document.getElementById('p3').classList.remove('done');
}
</script>
</body>
</html>
