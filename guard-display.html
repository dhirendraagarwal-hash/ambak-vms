<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AMBAK · Guard Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --navy:#0B1F3A; --navy-light:#132C52; --amber:#E0932A; --amber-deep:#C9781A;
  --green:#1F8A57; --muted:#B9C3D6;
  --font-display:'Georgia','Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
body{
  margin:0;font-family:var(--font-body);
  background:linear-gradient(180deg,var(--navy) 0%,#173764 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{background:#fff;border-radius:20px;padding:36px;max-width:440px;width:100%;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,0.35);}
.mark{width:56px;height:56px;border-radius:12px;background:var(--amber);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:bold;font-size:26px;color:var(--navy);margin:0 auto 10px;}
.title{font-family:var(--font-display);font-size:22px;color:var(--navy);}
.sub{font-size:12.5px;color:#6B7280;margin-bottom:22px;}
#qr-box{display:inline-block;padding:16px;border:1px solid #E2E5EB;border-radius:12px;margin-bottom:18px;}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;background:#E6F5EC;color:var(--green);
  font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:10px;
}
.live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;}
@keyframes pulse{0%{opacity:1;}50%{opacity:.35;}100%{opacity:1;}}
.timer{font-family:var(--font-display);font-size:15px;color:var(--navy);font-weight:bold;}
.timer span{color:var(--amber-deep);}
.hint{font-size:11.5px;color:#6B7280;margin-top:16px;line-height:1.5;}
.warn{
  margin-top:18px;background:#FEF1DE;border:1px solid #F3D9AE;border-radius:8px;
  padding:10px 12px;font-size:11px;color:#7A4E10;text-align:left;
}
</style>
</head>
<body>
<div class="card">
  <div class="mark">A</div>
  <div class="title">AMBAK Entrance QR</div>

  <div class="live-badge"><span class="dot"></span>LIVE — refreshes automatically</div>
  <div id="qr-box"></div>
  <div class="timer">Refreshes in <span id="countdown">--</span></div>
</div>

<script>
/* Must match index.html exactly */
const KIOSK_BASE_URL = 'https://dhirendraagarwal-hash.github.io/ambak-vms/';
const CHECKIN_SECRET = 'AMBAK-SECRET-2026';

function simpleHash(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = ((hash<<5)-hash)+str.charCodeAt(i); hash|=0; }
  return Math.abs(hash);
}
function getCurrentCheckinCode(){
  const windowId = Math.floor(Date.now() / (30*60*1000));
  const hash = simpleHash(CHECKIN_SECRET + '-' + windowId);
  return String(hash % 10000).padStart(4, '0');
}
function msUntilNextWindow(){
  const windowMs = 30*60*1000;
  return windowMs - (Date.now() % windowMs);
}

let lastCode = null;
function renderQR(){
  const code = getCurrentCheckinCode();
  if(code !== lastCode){
    lastCode = code;
    const url = KIOSK_BASE_URL + '?code=' + code;
    const box = document.getElementById('qr-box');
    box.innerHTML = '';
    new QRCode(box, {text:url, width:220, height:220, colorDark:'#0B1F3A', colorLight:'#ffffff'});
  }
}
function tick(){
  renderQR();
  const ms = msUntilNextWindow();
  const mins = Math.floor(ms/60000);
  const secs = Math.floor((ms%60000)/1000);
  document.getElementById('countdown').textContent = mins + 'm ' + String(secs).padStart(2,'0') + 's';
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
